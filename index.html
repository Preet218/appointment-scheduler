<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appointment Desk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #fdf8f3;
      --card:    #ffffff;
      --ink:     #1a1208;
      --muted:   #8a7560;
      --accent:  #c8440a;
      --accent2: #e8a030;
      --border:  #e8ddd0;
      --booked:  #f0e8df;
      --success: #2d7a4f;
    }

    body { font-family: 'Lora', serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

    /* ── Header ── */
    .header { background: var(--ink); border-bottom: 3px solid var(--accent); padding: 0 40px; }
    .header-inner { max-width: 1100px; margin: 0 auto; }
    .header-top { display: flex; align-items: flex-end; justify-content: space-between; padding: 28px 0 0; }
    .header-eyebrow { font-size: 11px; letter-spacing: .2em; color: var(--accent2); text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 6px; }
    .header-title { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; color: #fdf8f3; }
    .header-count { text-align: right; }
    .header-count-label { font-size: 12px; color: #8a7560; margin-bottom: 4px; }
    .header-count-num { font-family: 'Syne', sans-serif; font-size: 38px; font-weight: 800; color: var(--accent2); line-height: 1; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; padding-top: 20px; }
    .tab { padding: 12px 28px; border: none; border-radius: 8px 8px 0 0; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .2s; }
    .tab.active { background: var(--bg); color: var(--ink); }
    .tab.inactive { background: transparent; color: #8a7560; }
    .tab.inactive:hover { color: #ccc; }

    /* ── Main ── */
    .main { max-width: 1100px; margin: 0 auto; padding: 36px 40px; }
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Book panel grid ── */
    .book-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }

    /* ── Section card ── */
    .section-card { background: #fff; border: 1.5px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 16px; }
    .section-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; }

    /* ── Form fields ── */
    .field { margin-bottom: 14px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; color: var(--muted); font-style: italic; margin-bottom: 5px; }
    .field input, .field textarea, .field select {
      width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 8px;
      background: var(--bg); color: var(--ink); font-family: 'Lora', serif; font-size: 14px; outline: none;
      transition: border .2s;
    }
    .field input:focus, .field textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px #c8440a18; }
    .field textarea { resize: vertical; min-height: 80px; }
    .field .err { font-size: 11px; color: var(--accent); margin-top: 4px; }

    /* ── Slot summary ── */
    .slot-summary { padding: 16px 20px; background: #fff7f0; border: 1.5px solid var(--accent); border-radius: 10px; margin-top: 16px; }
    .slot-summary-label { font-size: 11px; color: var(--accent); letter-spacing: .1em; text-transform: uppercase; font-family: 'Syne', sans-serif; margin-bottom: 6px; }
    .slot-summary-value { font-weight: 600; color: var(--ink); }

    /* ── Confirm button ── */
    .btn-confirm {
      margin-top: 24px; width: 100%; padding: 15px; background: var(--accent); color: #fff;
      border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-size: 15px;
      font-weight: 800; letter-spacing: .05em; text-transform: uppercase; cursor: pointer;
      box-shadow: 0 4px 20px #c8440a44; transition: transform .15s, box-shadow .15s;
    }
    .btn-confirm:hover { transform: translateY(-2px); box-shadow: 0 8px 28px #c8440a55; }

    /* ── Date grid ── */
    .date-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 24px; }
    .date-btn {
      padding: 10px 8px; border-radius: 8px; cursor: pointer; text-align: center;
      transition: all .15s; font-family: 'Lora', serif; font-size: 12px;
      border: 1.5px solid var(--border); background: var(--card); color: var(--ink);
    }
    .date-btn:hover:not(.full) { border-color: var(--accent); }
    .date-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
    .date-btn.full { background: var(--booked); color: var(--muted); cursor: not-allowed; }
    .date-btn .day-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; }
    .date-btn .day-date { font-size: 11px; opacity: .8; }
    .date-btn .day-count { font-size: 10px; margin-top: 2px; }

    /* ── Time slots ── */
    .time-prompt { font-size: 12px; color: var(--muted); margin-bottom: 10px; font-style: italic; }
    .no-date-prompt { text-align: center; padding: 32px 0; color: var(--muted); font-style: italic; }
    .time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .time-btn {
      padding: 10px 6px; border-radius: 8px; cursor: pointer; text-align: center;
      font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
      border: 1.5px solid var(--border); background: var(--card); color: var(--ink);
      transition: all .15s;
    }
    .time-btn:hover:not(.booked) { border-color: var(--accent); }
    .time-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
    .time-btn.booked { background: var(--booked); color: var(--muted); cursor: not-allowed; text-decoration: line-through; }
    .time-btn .booked-label { font-size: 9px; font-weight: 400; margin-top: 2px; font-family: 'Lora', serif; }

    /* ── Inventory ── */
    .inv-toolbar { display: flex; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
    .inv-toolbar input, .inv-toolbar select {
      padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px;
      background: #fff; color: var(--ink); font-family: 'Lora', serif; font-size: 13px; outline: none;
    }
    .inv-toolbar input { width: 240px; }
    .inv-toolbar select { width: 200px; }
    .inv-count { margin-left: auto; font-family: 'Syne', sans-serif; font-weight: 700; color: var(--muted); font-size: 13px; }

    .appt-empty { text-align: center; padding: 80px 0; color: var(--muted); }
    .appt-empty-icon { font-size: 48px; margin-bottom: 16px; }
    .appt-empty-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; }

    .appt-list { display: flex; flex-direction: column; gap: 12px; }
    .appt-card {
      background: #fff; border: 1.5px solid var(--border); border-radius: 12px;
      padding: 20px 24px; display: grid; grid-template-columns: 80px 1fr auto;
      gap: 20px; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,.04);
    }
    .appt-index { text-align: center; }
    .appt-num { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; color: var(--accent); }
    .appt-datelabel { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .appt-time { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; margin-top: 2px; }
    .appt-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; }
    .appt-city { background: #f0ede8; padding: 2px 10px; border-radius: 20px; font-size: 11px; color: var(--muted); }
    .appt-purpose { font-size: 13px; margin-bottom: 4px; }
    .appt-purpose span { color: var(--muted); }
    .appt-comments { font-size: 12px; color: var(--muted); font-style: italic; }
    .appt-meta { display: flex; gap: 16px; margin-top: 8px; }
    .appt-mobile { font-size: 12px; color: var(--muted); }
    .appt-bookedat { font-size: 11px; color: #c0b0a0; }
    .btn-remove {
      background: none; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 8px 14px; color: var(--muted); font-size: 12px;
      font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; transition: all .15s;
    }
    .btn-remove:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Birth fields ── */
    .field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 14px; }

    /* ── Edit button ── */
    .btn-edit {
      background: none; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 8px 14px; color: var(--muted); font-size: 12px;
      font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer;
      transition: all .15s; margin-bottom: 8px; display: block; width: 100%;
    }
    .btn-edit:hover { border-color: #2d7a4f; color: #2d7a4f; }

    /* ── Edit modal overlay ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(26,18,8,.7);
      z-index: 1000; display: flex; align-items: center; justify-content: center;
      padding: 20px; animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-box {
      background: var(--card); border: 1.5px solid var(--border); border-radius: 16px;
      padding: 32px; width: 100%; max-width: 600px; max-height: 90vh;
      overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.3);
      animation: slideUp .25s ease;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .modal-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--ink); margin-bottom: 6px; }
    .modal-subtitle { font-size: 12px; color: var(--muted); font-style: italic; margin-bottom: 24px; }
    .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
    .btn-save-edit {
      flex: 1; padding: 13px; background: var(--accent); color: #fff; border: none;
      border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 14px; cursor: pointer; transition: opacity .15s;
    }
    .btn-save-edit:hover { opacity: .88; }
    .btn-cancel-edit {
      flex: 0 0 auto; padding: 13px 22px; background: none;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px;
      color: var(--muted); cursor: pointer; transition: all .15s;
    }
    .btn-cancel-edit:hover { border-color: var(--ink); color: var(--ink); }

    /* ── Birth info badge on card ── */
    .appt-birth { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 4px; }

    /* ── Toast ── */
    .toast {
      position: fixed; top: 20px; right: 20px; z-index: 9999;
      padding: 14px 22px; border-radius: 10px; font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 700; max-width: 340px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      animation: slideIn .3s ease; pointer-events: none;
    }
    .toast.success { background: var(--success); color: #fff; }
    .toast.error   { background: var(--accent);  color: #fff; }
    @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }

    /* ── Validation error bar ── */
    .error-bar { color: var(--accent); font-size: 13px; margin-top: 10px; }

    /* ── Back-date mode ── */
    .backdate-toggle { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding: 10px 14px; background: #fff7f0; border: 1.5px dashed var(--accent); border-radius: 10px; cursor: pointer; user-select: none; }
    .backdate-toggle input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
    .backdate-toggle span { font-size: 13px; color: var(--accent); font-family: 'Syne', sans-serif; font-weight: 700; }
    .backdate-toggle small { font-size: 11px; color: var(--muted); font-style: italic; margin-left: auto; }
    .backdate-picker { margin-bottom: 16px; }
    .backdate-picker label { display: block; font-size: 12px; color: var(--muted); font-style: italic; margin-bottom: 6px; }
    .backdate-picker input[type=date] { padding: 10px 14px; border: 1.5px solid var(--accent); border-radius: 8px; background: var(--bg); color: var(--ink); font-family: 'Lora', serif; font-size: 14px; outline: none; width: 100%; }
    .date-btn.past { border-style: dashed; opacity: .75; }
    .past-badge { display: inline-block; font-size: 9px; background: var(--accent2); color: #fff; font-family: 'Syne', sans-serif; font-weight: 700; padding: 1px 6px; border-radius: 10px; margin-top: 3px; letter-spacing: .04em; }

    /* ── Back-date toggle ── */
    .backdate-toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .backdate-toggle-label { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--ink); }
    .backdate-toggle-label small { display: block; font-family: 'Lora', serif; font-size: 11px; font-weight: 400; color: var(--muted); font-style: italic; margin-top: 2px; }
    .toggle-btn {
      position: relative; width: 46px; height: 26px; border: none; border-radius: 13px;
      background: var(--border); cursor: pointer; transition: background .25s; flex-shrink: 0;
    }
    .toggle-btn.on { background: var(--accent); }
    .toggle-btn::after {
      content: ''; position: absolute; top: 3px; left: 3px;
      width: 20px; height: 20px; border-radius: 50%; background: #fff;
      transition: transform .25s; box-shadow: 0 1px 4px rgba(0,0,0,.2);
    }
    .toggle-btn.on::after { transform: translateX(20px); }

    .backdate-picker { margin-bottom: 16px; }
    .backdate-picker label { display: block; font-size: 12px; color: var(--muted); font-style: italic; margin-bottom: 5px; }
    .backdate-picker input[type=date] {
      width: 100%; padding: 11px 14px; border: 1.5px solid var(--accent); border-radius: 8px;
      background: #fff7f0; color: var(--ink); font-family: 'Lora', serif; font-size: 14px;
      outline: none; transition: border .2s;
    }
    .backdate-picker input[type=date]:focus { box-shadow: 0 0 0 3px #c8440a18; }

    .badge-backdate {
      display: inline-block; background: #fff3e0; color: #b85c00;
      border: 1px solid #f0c070; border-radius: 20px;
      font-size: 10px; font-family: 'DM Mono', monospace; font-weight: 600;
      padding: 2px 8px; margin-left: 6px; vertical-align: middle;
    }

    @media (max-width: 760px) {
      .book-grid { grid-template-columns: 1fr; }
      .header { padding: 0 20px; }
      .main { padding: 24px 20px; }
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div>
        <div class="header-eyebrow">Scheduling System</div>
        <div class="header-title">Appointment Desk</div>
      </div>
      <div class="header-count">
        <div class="header-count-label">Total Bookings</div>
        <div class="header-count-num" id="totalCount">0</div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('book')">📅 Book Appointment</button>
      <button class="tab inactive" onclick="switchTab('inventory')">📋 View All Bookings</button>
    </div>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- ── BOOK PANEL ── -->
  <div id="panel-book" class="panel active">
    <div class="book-grid">

      <!-- Left: Form -->
      <div>
        <div class="section-card">
          <div class="section-title">Your Details</div>

          <div class="field">
            <label>Full Name *</label>
            <input type="text" id="f-name" placeholder="e.g. Rahul Sharma" />
            <div class="err" id="err-name"></div>
          </div>
          <div class="field">
            <label>Purpose of Visit *</label>
            <input type="text" id="f-purpose" placeholder="e.g. Consultation, Follow-up…" />
            <div class="err" id="err-purpose"></div>
          </div>
          <div class="field-row">
            <div class="field" style="margin-bottom:0">
              <label>Mobile Number *</label>
              <input type="tel" id="f-mobile" placeholder="10-digit mobile" maxlength="10" />
              <div class="err" id="err-mobile"></div>
            </div>
            <div class="field" style="margin-bottom:0">
              <label>City *</label>
              <input type="text" id="f-city" placeholder="e.g. Mumbai" />
              <div class="err" id="err-city"></div>
            </div>
          </div>
          <!-- Birth details row -->
          <div class="field-row-3" style="margin-top:14px">
            <div class="field" style="margin-bottom:0">
              <label>Date of Birth</label>
              <input type="date" id="f-dob" />
            </div>
            <div class="field" style="margin-bottom:0">
              <label>Time of Birth</label>
              <input type="time" id="f-tob" placeholder="e.g. 06:45 AM" />
            </div>
            <div class="field" style="margin-bottom:0">
              <label>Birthplace</label>
              <input type="text" id="f-birthplace" placeholder="e.g. Pune" />
            </div>
          </div>

          <div class="field" style="margin-top:14px">
            <label>Additional Comments</label>
            <textarea id="f-comments" placeholder="Any additional info…"></textarea>
          </div>
        </div>

        <!-- Slot summary -->
        <div id="slot-summary" class="slot-summary" style="display:none">
          <div class="slot-summary-label">Selected Slot</div>
          <div class="slot-summary-value" id="slot-summary-text"></div>
        </div>
        <div class="error-bar" id="err-slot"></div>

        <button class="btn-confirm" onclick="handleBook()">Confirm Appointment</button>
      </div>

      <!-- Right: Calendar + Time -->
      <div>
        <div class="section-card">
          <div class="section-title">Pick a Date &amp; Time</div>

          <!-- Back-date toggle -->
          <label class="backdate-toggle" onclick="toggleBackdate()">
            <input type="checkbox" id="backdate-check" onclick="event.stopPropagation();toggleBackdate()" />
            <span>📋 Record a past appointment</span>
            <small>Back-date mode</small>
          </label>
          <div id="backdate-picker" class="backdate-picker" style="display:none">
            <label>Select any past date</label>
            <input type="date" id="backdate-input" max="" onchange="applyBackdate()" />
          </div>

          <div class="date-grid" id="date-grid"></div>

          <!-- Back-date toggle -->
          <div class="backdate-toggle-row">
            <div class="backdate-toggle-label">
              Back-date Entry
              <small>Add a record for a past date</small>
            </div>
            <button class="toggle-btn" id="backdate-toggle" onclick="toggleBackdate()" title="Enable back-date entry"></button>
          </div>

          <!-- Back-date date picker (hidden by default) -->
          <div class="backdate-picker" id="backdate-picker" style="display:none">
            <label>Select Past Date *</label>
            <input type="date" id="backdate-input" max="" onchange="handleBackdateChange(this.value)" />
          </div>

          <div id="time-section">
            <div class="no-date-prompt">← Select a date to view available slots</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ── INVENTORY PANEL ── -->
  <div id="panel-inventory" class="panel">
    <div class="inv-toolbar">
      <input type="text" id="inv-search" placeholder="Search name, city, purpose…" oninput="renderInventory()" />
      <select id="inv-filter" onchange="renderInventory()">
        <option value="all">All Dates</option>
      </select>
      <div class="inv-count" id="inv-count">0 appointments</div>
    </div>
    <div id="inv-list"></div>
  </div>

</div>

<!-- Edit modal -->
<div id="edit-modal" class="modal-overlay" style="display:none" onclick="handleModalOverlayClick(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title">✏️ Edit Appointment</div>
    <div class="modal-subtitle" id="edit-modal-subtitle">Editing record</div>

    <div class="field">
      <label>Full Name *</label>
      <input type="text" id="e-name" />
      <div class="err" id="e-err-name"></div>
    </div>
    <div class="field">
      <label>Purpose of Visit *</label>
      <input type="text" id="e-purpose" />
      <div class="err" id="e-err-purpose"></div>
    </div>
    <div class="field-row">
      <div class="field" style="margin-bottom:0">
        <label>Mobile Number *</label>
        <input type="tel" id="e-mobile" maxlength="10" />
        <div class="err" id="e-err-mobile"></div>
      </div>
      <div class="field" style="margin-bottom:0">
        <label>City *</label>
        <input type="text" id="e-city" />
        <div class="err" id="e-err-city"></div>
      </div>
    </div>

    <div class="field-row-3" style="margin-top:14px">
      <div class="field" style="margin-bottom:0">
        <label>Date of Birth</label>
        <input type="date" id="e-dob" />
      </div>
      <div class="field" style="margin-bottom:0">
        <label>Time of Birth</label>
        <input type="time" id="e-tob" />
      </div>
      <div class="field" style="margin-bottom:0">
        <label>Birthplace</label>
        <input type="text" id="e-birthplace" placeholder="e.g. Pune" />
      </div>
    </div>

    <div class="field" style="margin-top:14px">
      <label>Additional Comments</label>
      <textarea id="e-comments"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel-edit" onclick="closeEditModal()">Cancel</button>
      <button class="btn-save-edit" onclick="handleEditSave()">Save Changes</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const HOURS = [
  { value: '11:00', label: '11:00 AM' },
  { value: '11:30', label: '11:30 AM' },
  { value: '12:00', label: '12:00 PM' },
  { value: '12:30', label: '12:30 PM' },
  { value: '13:00', label: '01:00 PM' },
  { value: '13:30', label: '01:30 PM' },
  { value: '14:00', label: '02:00 PM' },
  { value: '14:30', label: '02:30 PM' },
  { value: '15:00', label: '03:00 PM' },
  { value: '15:30', label: '03:30 PM' },
  { value: '16:00', label: '04:00 PM' },
  { value: '16:30', label: '04:30 PM' },
  { value: '17:00', label: '05:00 PM' },
  { value: '17:30', label: '05:30 PM' },
  { value: '18:00', label: '06:00 PM' },
  { value: '18:30', label: '06:30 PM' },
  { value: '19:00', label: '07:00 PM' },
];

let appointments = [];
let selectedDate = null;   // Date object
let selectedTime = null;   // e.g. "14:00"
let backdateMode = false;  // true = back-date entry enabled

// ── Startup ──────────────────────────────────────────────────────────────────
async function init() {
  await loadAppointments();
  buildDateGrid();
  renderInventory();
  updateCount();
}

// ── Local edit overlay — persists edits across page reloads ──────────────────
// The server may not support PATCH, so edits are mirrored to localStorage.
// On every load the server list is merged with the local overlay.
const EDITS_KEY = 'appt_edits_v1';

function loadLocalEdits() {
  try { return JSON.parse(localStorage.getItem(EDITS_KEY) || '{}'); }
  catch { return {}; }
}

function saveLocalEdit(id, fields) {
  const edits = loadLocalEdits();
  edits[id] = { ...(edits[id] || {}), ...fields };
  localStorage.setItem(EDITS_KEY, JSON.stringify(edits));
}

function removeLocalEdit(id) {
  const edits = loadLocalEdits();
  delete edits[id];
  localStorage.setItem(EDITS_KEY, JSON.stringify(edits));
}

function applyLocalEdits(serverList) {
  const edits = loadLocalEdits();
  return serverList.map(a => edits[a.id] ? { ...a, ...edits[a.id] } : a);
}

// ── API calls ─────────────────────────────────────────────────────────────────
async function loadAppointments() {
  try {
    const res = await fetch('/api/appointments');
    const serverData = await res.json();
    // Merge locally-saved edits on top of server data so edits persist
    appointments = applyLocalEdits(serverData);
  } catch (e) {
    showToast('Could not connect to server', 'error');
    appointments = [];
  }
}

async function saveAppointment(appt) {
  const res = await fetch('/api/appointments', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(appt),
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error || 'Failed to save');
  }
  return res.json();
}

async function deleteAppointment(id) {
  const res = await fetch(`/api/appointments/${id}`, { method: 'DELETE' });
  if (!res.ok) throw new Error('Failed to delete');
}

async function updateAppointment(id, data) {
  const res = await fetch(`/api/appointments/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || 'Failed to update');
  }
  return res.json();
}

// ── Edit modal ────────────────────────────────────────────────────────────────
let editingId = null;

function openEditModal(id) {
  const a = appointments.find(x => x.id === id);
  if (!a) return;
  editingId = id;

  const hLabel = HOURS.find(h => h.value === a.time)?.label || a.time;
  document.getElementById('edit-modal-subtitle').textContent =
    `Appointment on ${a.dateLabel || a.date} at ${hLabel}`;

  document.getElementById('e-name').value       = a.name       || '';
  document.getElementById('e-purpose').value    = a.purpose    || '';
  document.getElementById('e-mobile').value     = a.mobile     || '';
  document.getElementById('e-city').value       = a.city       || '';
  document.getElementById('e-comments').value   = a.comments   || '';
  document.getElementById('e-dob').value        = a.dob        || '';
  document.getElementById('e-tob').value        = a.tob        || '';
  document.getElementById('e-birthplace').value = a.birthplace || '';

  ['name','purpose','mobile','city'].forEach(k =>
    document.getElementById('e-err-' + k).textContent = '');

  document.getElementById('edit-modal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeEditModal() {
  document.getElementById('edit-modal').style.display = 'none';
  document.body.style.overflow = '';
  editingId = null;
}

function handleModalOverlayClick(e) {
  if (e.target.id === 'edit-modal') closeEditModal();
}

async function handleEditSave() {
  // Validate required fields
  let ok = true;
  ['name','purpose','mobile','city'].forEach(k => {
    document.getElementById('e-err-' + k).textContent = '';
  });
  const name    = document.getElementById('e-name').value.trim();
  const purpose = document.getElementById('e-purpose').value.trim();
  const mobile  = document.getElementById('e-mobile').value.trim();
  const city    = document.getElementById('e-city').value.trim();

  if (!name)   { document.getElementById('e-err-name').textContent = '⚠ Required'; ok = false; }
  if (!purpose){ document.getElementById('e-err-purpose').textContent = '⚠ Required'; ok = false; }
  if (!/^[6-9]\d{9}$/.test(mobile)) { document.getElementById('e-err-mobile').textContent = '⚠ Valid 10-digit number'; ok = false; }
  if (!city)   { document.getElementById('e-err-city').textContent = '⚠ Required'; ok = false; }
  if (!ok) return;

  const updates = {
    name, purpose, mobile, city,
    comments:   document.getElementById('e-comments').value.trim(),
    dob:        document.getElementById('e-dob').value,
    tob:        document.getElementById('e-tob').value,
    birthplace: document.getElementById('e-birthplace').value.trim(),
  };

  // Always persist to localStorage first — this survives page reloads
  // regardless of whether the server supports PATCH.
  saveLocalEdit(editingId, updates);
  appointments = appointments.map(a => a.id === editingId ? { ...a, ...updates } : a);

  // Also attempt to sync to the server (best-effort, silently ignored if unsupported)
  updateAppointment(editingId, updates).catch(() => {});

  closeEditModal();
  renderInventory();
  showToast('✓ Appointment updated');
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.className = 'tab ' + ((['book','inventory'][i] === tab) ? 'active' : 'inactive');
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'inventory') renderInventory();
}

// ── Date helpers ──────────────────────────────────────────────────────────────
function getWorkingDays(n = 18) {
  const days = [];
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  while (days.length < n) {
    if (d.getDay() !== 0) days.push(new Date(d)); // skip Sunday
    d.setDate(d.getDate() + 1);
  }
  return days;
}

function isoDate(d) {
  return d.toISOString().split('T')[0];
}

function formatDateLabel(d) {
  return d.toLocaleDateString('en-IN', { weekday: 'short', day: '2-digit', month: 'short' });
}

function slotKey(dateStr, time) { return `${dateStr}__${time}`; }

function bookedSet() {
  return new Set(appointments.map(a => slotKey(a.date, a.time)));
}

// ── Back-date mode ───────────────────────────────────────────────────────────
function toggleBackdate() {
  backdateMode = !backdateMode;
  const btn = document.getElementById('backdate-toggle');
  const picker = document.getElementById('backdate-picker');
  const input = document.getElementById('backdate-input');

  btn.classList.toggle('on', backdateMode);

  if (backdateMode) {
    // Set max to yesterday
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    input.max = isoDate(yesterday);
    input.value = '';
    picker.style.display = 'block';
    // Clear any forward date selection
    selectedDate = null;
    selectedTime = null;
    updateSlotSummary();
    buildTimeSlots();
    buildDateGrid(); // grey out forward grid
  } else {
    picker.style.display = 'none';
    input.value = '';
    selectedDate = null;
    selectedTime = null;
    updateSlotSummary();
    buildDateGrid();
    buildTimeSlots();
  }
}

function handleBackdateChange(val) {
  if (!val) return;
  // Parse as local date (avoid timezone offset issues)
  const [y, m, d] = val.split('-').map(Number);
  selectedDate = new Date(y, m - 1, d);
  selectedTime = null;
  updateSlotSummary();
  buildTimeSlots();
  document.getElementById('err-slot').textContent = '';
}

// ── Back-date mode ───────────────────────────────────────────────────────────
function toggleBackdate() {
  backdateMode = document.getElementById('backdate-check').checked;
  const picker = document.getElementById('backdate-picker');
  picker.style.display = backdateMode ? 'block' : 'none';

  // Set max date to yesterday
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
  document.getElementById('backdate-input').max = isoDate(yesterday);

  if (!backdateMode) {
    // Reset any back-dated selection if toggling off
    if (selectedDate && isoDate(selectedDate) < isoDate(new Date())) {
      selectedDate = null;
      selectedTime = null;
      updateSlotSummary();
      buildTimeSlots();
    }
    document.getElementById('backdate-input').value = '';
  }
  buildDateGrid();
}

function applyBackdate() {
  const val = document.getElementById('backdate-input').value;
  if (!val) return;
  const d = new Date(val + 'T00:00:00');
  selectedDate = d;
  selectedTime = null;
  updateSlotSummary();
  buildDateGrid();
  buildTimeSlots();
}

// ── Build date grid ───────────────────────────────────────────────────────────
function buildDateGrid() {
  const grid = document.getElementById('date-grid');
  grid.innerHTML = '';
  const booked = bookedSet();
  const days = getWorkingDays(18);

  // In backdate mode, dim the forward grid with an overlay message
  if (backdateMode) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px 0;color:var(--muted);font-style:italic;font-size:13px;">Back-date mode active — use the date picker above</div>';
    return;
  }

  days.forEach(d => {
    const ds = isoDate(d);
    const bookedCount = appointments.filter(a => a.date === ds).length;
    const full = bookedCount >= HOURS.length;
    const isSelected = selectedDate && isoDate(selectedDate) === ds;

    const todayStr = isoDate(new Date());
    const isPast = ds < todayStr;
    const btn = document.createElement('div');
    btn.className = 'date-btn' + (isSelected ? ' selected' : '') + (full ? ' full' : '') + (isPast ? ' past' : '');
    btn.innerHTML = `
      <div class="day-name">${d.toLocaleDateString('en-IN', { weekday: 'short' })}</div>
      <div class="day-date">${d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' })}</div>
      ${isPast ? '<div class="past-badge">PAST</div>' : ''}
      ${bookedCount > 0 && !full ? `<div class="day-count" style="color:${isSelected?'#ffd':' var(--accent)'}">${bookedCount}/${HOURS.length}</div>` : ''}
      ${full ? `<div class="day-count">Full</div>` : ''}
    `;
    if (!full) {
      btn.onclick = () => {
        selectedDate = d;
        selectedTime = null;
        updateSlotSummary();
        buildDateGrid();
        buildTimeSlots();
      };
    }
    grid.appendChild(btn);
  });
}

// ── Build time slots ──────────────────────────────────────────────────────────
function buildTimeSlots() {
  const section = document.getElementById('time-section');
  if (!selectedDate) {
    section.innerHTML = '<div class="no-date-prompt">← Select a date to view available slots</div>';
    return;
  }

  const ds = isoDate(selectedDate);
  const booked = bookedSet();
  const label = formatDateLabel(selectedDate);

  const todayStr2 = isoDate(new Date());
  const isPastDate = ds < todayStr2;
  let html = `<div class="time-prompt">
    ${isPastDate ? '<span style="color:var(--accent2);font-family:Syne,sans-serif;font-weight:700;font-size:11px;letter-spacing:.06em;">📋 BACK-DATING — </span>' : ''}
    Available slots for ${label}
  </div>`;
  html += '<div class="time-grid">';
  HOURS.forEach(h => {
    const isBooked = booked.has(slotKey(ds, h.value));
    const isSelected = selectedTime === h.value;
    let cls = 'time-btn';
    if (isBooked) cls += ' booked';
    else if (isSelected) cls += ' selected';
    html += `
      <div class="${cls}" ${isBooked ? '' : `onclick="selectTime('${h.value}')"`}>
        ${h.label}
        ${isBooked ? '<div class="booked-label">Booked</div>' : ''}
      </div>`;
  });
  html += '</div>';
  section.innerHTML = html;
}

function selectTime(time) {
  selectedTime = time;
  updateSlotSummary();
  buildTimeSlots();
  document.getElementById('err-slot').textContent = '';
}

function updateSlotSummary() {
  const box = document.getElementById('slot-summary');
  const txt = document.getElementById('slot-summary-text');
  if (selectedDate && selectedTime) {
    const hLabel = HOURS.find(h => h.value === selectedTime)?.label || selectedTime;
    const todayIso = isoDate(new Date());
    const isBackdated = isoDate(selectedDate) < todayIso;
    txt.innerHTML = `${formatDateLabel(selectedDate)}&nbsp;&nbsp;·&nbsp;&nbsp;${hLabel}${isBackdated ? '&nbsp;&nbsp;<span style="background:var(--accent2);color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-family:Syne,sans-serif;font-weight:700">PAST RECORD</span>' : ''}`;
    box.style.display = 'block';
  } else {
    box.style.display = 'none';
  }
}

// ── Validation ────────────────────────────────────────────────────────────────
function clearErrors() {
  ['name','purpose','mobile','city','slot'].forEach(k => {
    const el = document.getElementById('err-' + k);
    if (el) el.textContent = '';
  });
}

function validate() {
  clearErrors();
  let ok = true;
  const name = document.getElementById('f-name').value.trim();
  const purpose = document.getElementById('f-purpose').value.trim();
  const mobile = document.getElementById('f-mobile').value.trim();
  const city = document.getElementById('f-city').value.trim();

  if (!name)   { document.getElementById('err-name').textContent = '⚠ Required'; ok = false; }
  if (!purpose){ document.getElementById('err-purpose').textContent = '⚠ Required'; ok = false; }
  if (!/^[6-9]\d{9}$/.test(mobile)) { document.getElementById('err-mobile').textContent = '⚠ Valid 10-digit number'; ok = false; }
  if (!city)   { document.getElementById('err-city').textContent = '⚠ Required'; ok = false; }
  if (!selectedDate || !selectedTime) { document.getElementById('err-slot').textContent = '⚠ Please select a date and time slot'; ok = false; }
  return ok;
}

// ── Book appointment ──────────────────────────────────────────────────────────
async function handleBook() {
  if (!validate()) return;

  const appt = {
    name:       document.getElementById('f-name').value.trim(),
    purpose:    document.getElementById('f-purpose').value.trim(),
    comments:   document.getElementById('f-comments').value.trim(),
    mobile:     document.getElementById('f-mobile').value.trim(),
    city:       document.getElementById('f-city').value.trim(),
    dob:        document.getElementById('f-dob').value,
    tob:        document.getElementById('f-tob').value,
    birthplace: document.getElementById('f-birthplace').value.trim(),
    date:       isoDate(selectedDate),
    dateLabel:  formatDateLabel(selectedDate),
    time:       selectedTime,
    isBackdated: backdateMode,
  };

  try {
    const saved = await saveAppointment(appt);
    appointments.push(saved);

    // Reset form
    ['name','purpose','mobile','city','comments','dob','tob','birthplace'].forEach(k => {
      document.getElementById('f-' + k).value = '';
    });
    selectedDate = null;
    selectedTime = null;
    // Reset backdate mode
    if (backdateMode) {
      backdateMode = false;
      document.getElementById('backdate-toggle').classList.remove('on');
      document.getElementById('backdate-picker').style.display = 'none';
      document.getElementById('backdate-input').value = '';
    }
    updateSlotSummary();
    buildDateGrid();
    buildTimeSlots();
    updateCount();
    updateInventoryFilter();

    const hLabel = HOURS.find(h => h.value === appt.time)?.label || appt.time;
    showToast(`✓ Appointment confirmed for ${appt.dateLabel} at ${hLabel}`);
  } catch (e) {
    showToast(e.message || 'Failed to book', 'error');
  }
}

// ── Delete appointment ────────────────────────────────────────────────────────
async function handleDelete(id) {
  try {
    await deleteAppointment(id);
    removeLocalEdit(id);   // clean up any local edit overlay for this record
    appointments = appointments.filter(a => a.id !== id);
    buildDateGrid();
    buildTimeSlots();
    renderInventory();
    updateCount();
    showToast('Appointment removed', 'error');
  } catch (e) {
    showToast('Failed to remove', 'error');
  }
}

// ── Inventory ─────────────────────────────────────────────────────────────────
function updateInventoryFilter() {
  const sel = document.getElementById('inv-filter');
  const current = sel.value;
  const dates = [...new Set(appointments.map(a => a.date))].sort();
  sel.innerHTML = '<option value="all">All Dates</option>';
  dates.forEach(d => {
    const [dy, dm, dd] = d.split('-').map(Number);
    const label = new Date(dy, dm - 1, dd).toLocaleDateString('en-IN', { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' });
    sel.innerHTML += `<option value="${d}" ${current === d ? 'selected' : ''}>${label}</option>`;
  });
}

function renderInventory() {
  updateInventoryFilter();
  const search = (document.getElementById('inv-search')?.value || '').toLowerCase();
  const filterDate = document.getElementById('inv-filter')?.value || 'all';

  const filtered = appointments
    .filter(a => filterDate === 'all' || a.date === filterDate)
    .filter(a => !search || [a.name, a.city, a.purpose, a.mobile].some(v => v?.toLowerCase().includes(search)))
    .sort((a, b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));

  const listEl = document.getElementById('inv-list');
  const countEl = document.getElementById('inv-count');
  countEl.textContent = `${filtered.length} appointment${filtered.length !== 1 ? 's' : ''}`;

  if (!filtered.length) {
    listEl.innerHTML = `
      <div class="appt-empty">
        <div class="appt-empty-icon">📭</div>
        <div class="appt-empty-title">No appointments found</div>
        <div style="font-size:14px;margin-top:6px">Book your first appointment on the other tab</div>
      </div>`;
    return;
  }

  listEl.innerHTML = '<div class="appt-list">' + filtered.map((a, i) => {
    const hLabel = HOURS.find(h => h.value === a.time)?.label || a.time;

    // Format DOB nicely if present
    const dobFmt = a.dob
      ? (() => { const [y,m,d] = a.dob.split('-').map(Number); return new Date(y, m-1, d).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }); })()
      : null;
    // Format TOB nicely (convert 24h to 12h)
    let tobFmt = null;
    if (a.tob) {
      const [hh, mm] = a.tob.split(':').map(Number);
      const ampm = hh >= 12 ? 'PM' : 'AM';
      const h12  = ((hh % 12) || 12);
      tobFmt = `${String(h12).padStart(2,'0')}:${String(mm).padStart(2,'0')} ${ampm}`;
    }
    const birthLine = [
      dobFmt        ? `🎂 ${dobFmt}`  : null,
      tobFmt        ? `⏰ ${tobFmt}`   : null,
      a.birthplace  ? `📍 ${a.birthplace}` : null,
    ].filter(Boolean).join('  ·  ');

    return `
      <div class="appt-card">
        <div class="appt-index">
          <div class="appt-num">${String(i + 1).padStart(2, '0')}</div>
          ${a.date < new Date().toISOString().split('T')[0] ? '<div class="past-badge" style="margin:2px auto 0;">PAST</div>' : ''}
          <div class="appt-datelabel">${a.dateLabel || a.date}</div>
          <div class="appt-time">${hLabel}</div>
        </div>
        <div>
          <div style="display:flex;gap:10px;align-items:center;margin-bottom:6px;flex-wrap:wrap;">
            <span class="appt-name">${a.name}</span>
            <span class="appt-city">${a.city}</span>
            ${a.isBackdated ? '<span class="badge-backdate">📝 Back-dated</span>' : ''}
          </div>
          <div class="appt-purpose"><span>Purpose: </span>${a.purpose}</div>
          ${birthLine ? `<div class="appt-birth">${birthLine}</div>` : ''}
          ${a.comments ? `<div class="appt-comments">"${a.comments}"</div>` : ''}
          <div class="appt-meta">
            <span class="appt-mobile">📱 ${a.mobile}</span>
            <span class="appt-bookedat">Booked: ${a.bookedAt}</span>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:stretch;min-width:90px">
          <button class="btn-edit" onclick="openEditModal('${a.id}')">✏ Edit</button>
          <button class="btn-remove" onclick="handleDelete('${a.id}')">Remove</button>
        </div>
      </div>`;
  }).join('') + '</div>';
}

// ── Counter ───────────────────────────────────────────────────────────────────
function updateCount() {
  document.getElementById('totalCount').textContent = appointments.length;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 3400);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
init();
</script>
